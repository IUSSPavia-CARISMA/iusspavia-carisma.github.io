<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="icon" type="image/png" href="{{ '/assets/img/carisma_logo_negative.png' | relative_url }}">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #4a5259 0%, #5a6169 50%, #6b7a8a 100%);
      color: #fff;
      overflow: hidden;
      position: relative;
    }

    /* Animated background particles */
    .particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(168, 211, 45, 0.5);
      border-radius: 50%;
      animation: float 15s infinite;
    }

    .particle:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 20s; }
    .particle:nth-child(2) { left: 20%; animation-delay: 2s; animation-duration: 18s; }
    .particle:nth-child(3) { left: 30%; animation-delay: 4s; animation-duration: 22s; }
    .particle:nth-child(4) { left: 40%; animation-delay: 1s; animation-duration: 16s; }
    .particle:nth-child(5) { left: 50%; animation-delay: 3s; animation-duration: 19s; }
    .particle:nth-child(6) { left: 60%; animation-delay: 5s; animation-duration: 21s; }
    .particle:nth-child(7) { left: 70%; animation-delay: 2s; animation-duration: 17s; }
    .particle:nth-child(8) { left: 80%; animation-delay: 4s; animation-duration: 23s; }
    .particle:nth-child(9) { left: 90%; animation-delay: 1s; animation-duration: 18s; }
    .particle:nth-child(10) { left: 15%; animation-delay: 3s; animation-duration: 20s; }

    @keyframes float {
      0%, 100% {
        transform: translateY(100vh) scale(0);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateY(-100vh) scale(1);
        opacity: 0;
      }
    }

    .container {
      text-align: center;
      padding: 2rem;
      z-index: 1;
      position: relative;
    }

    .logo {
      margin: 0 auto 2rem;
    }

    .logo img {
      width: 180px;
      height: auto;
      object-fit: contain;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #fff 0%, #a8d32d 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: clamp(1rem, 3vw, 1.5rem);
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 3rem;
      font-weight: 400;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 1rem 2rem;
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      margin-bottom: 2rem;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      background: #a8d32d;
      border-radius: 50%;
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-text {
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .description {
      max-width: 500px;
      margin: 0 auto 3rem;
      color: rgba(255, 255, 255, 0.6);
      line-height: 1.8;
      font-size: 1.1rem;
    }

    .affiliation {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.9rem;
    }

    .affiliation a {
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
      transition: all 0.3s ease;
    }

    .affiliation a:hover {
      color: #fff;
      border-bottom-color: #fff;
    }

    /* Decorative elements */
    .glow {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.3;
      z-index: 0;
    }

    .glow-1 {
      background: #a8d32d;
      top: -200px;
      left: -200px;
    }

    .glow-2 {
      background: #a5ab96;
      bottom: -200px;
      right: -200px;
    }
  </style>
</head>
<body>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <div class="container">
    <div class="logo">
      <img src="{{ '/assets/img/carisma_logo_negative.png' | relative_url }}" alt="CARISMA Logo">
    </div>

    <h1>CARISMA</h1>
    <p class="subtitle">Climate change impAct studies for RISk MAnagement</p>

    <div class="status">
      <span class="status-dot"></span>
      <span class="status-text">Work in Progress</span>
    </div>

    <p class="description">
      We're building something new. Our website is currently under construction and will be available soon.
    </p>

    <p class="affiliation">
      Part of <a href="https://www.iusspavia.it/en" target="_blank" rel="noreferrer">IUSS Pavia</a>
    </p>
  </div>
</body>
</html>
