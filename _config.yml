# ============================================
# LAB WEBSITE CONFIGURATION
# Edit this file to customize your lab website
# ============================================

# Site Settings
name: "AgroSystems Lab"
description: "Exploring sustainable agriculture through systems thinking and innovative research"
url: "https://iusspavia-carisma.github.io"
baseurl: "/lab-website"

# Lab Information
lab:
  name: "CARISMA Lab"
  tagline: "Climate insight and risk intelligence for a sustainable future"
  department: "Climate, Sustainability and Risk"
  university: "Scuola Universitaria Superiore Pavia"
  location: "Pavia, Italy"
  founded: 2008

contact:
  email: "marco.gaetani@iusspavia.it; carisma@iusspavia.it"
  phone: "Tel: +39 0382 375811"
  address: |
    Piazza Ercole Marelli 15
    27100 Pavia, Italy
    Second floor
  map_link: "https://www.bing.com/maps/search?FORM=HDRSC6&style=r&cp=45.191269~9.148983&lvl=18.5"

# Social Links
social:
  # twitter: "https://twitter.com/labhandle"
  github: "https://github.com/IUSSPavia-CARISMA"
  # linkedin: "https://linkedin.com/company/lab"
  # bluesky: "https://bsky.app/profile/lab.bsky.social"

# Navigation
navigation:
  - title: "Research"
    url: "/research/"
  - title: "People"
    url: "/people/"
  - title: "Publications"
    url: "/publications/"
  - title: "News"
    url: "/news/"
  - title: "Contact"
    url: "/contact/"

# Theme Colors (CSS custom properties will use these)
colors:
  primary: "#2563eb"      # Blue
  secondary: "#059669"    # Green
  accent: "#dc2626"       # Red
  dark: "#1f2937"         # Dark gray
  light: "#f9fafb"        # Light gray

# Collections
collections:
  people:
    output: true
    permalink: /people/:name/
  publications:
    output: false
  research:
    output: true
    permalink: /research/:name/
  news:
    output: true
    permalink: /news/:title/

# Build Settings
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Defaults
defaults:
  - scope:
      path: ""
      type: "news"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "people"
    values:
      layout: "person"
  - scope:
      path: ""
      type: "research"
    values:
      layout: "research"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - LICENSE
